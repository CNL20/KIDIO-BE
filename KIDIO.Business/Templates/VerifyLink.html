<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your KIDIO account.</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f4f4f9;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 90%;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }

        .error {
            color: #dc3545;
        }

        .success {
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="card">
        {{StatusContent}}
        <p>Please choose where you want to return and log in:</p>
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
            <a href='kidio://app' class='btn' style='background-color: #007bff; margin: 0;'>OPEN IN MOBILE APP</a>
            <a href='{{FrontendUrl}}' class='btn' style='background-color: #28a745; margin: 0;'>OPEN IN WEB BROWSER</a>
        </div>
    </div>
</body>
</html>
