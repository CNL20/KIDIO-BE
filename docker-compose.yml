version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kidio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: KidioDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kidio-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=KidioDB;Username=postgres;Password=12345
      - ASPNETCORE_ENVIRONMENT=Development

volumes:
  postgres_data:
